<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffcf62">
    <title>Деми-кубики</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' x='6' font-size='44'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body { background: linear-gradient(135deg, #ff78a9 0%, #ffd36c 52%, #9ee8ff 100%); }
      .phone-shell { width: 100vw; height: 100dvh; display: grid; place-items: center; }
      .app { position: relative; width: 100%; height: 100dvh; max-width: 470px; overflow: hidden; background: #fff6dc; }
      .loading-screen { position: absolute; inset: 0; display: grid; place-items: center; padding: 24px; color: #74243d; text-align: center; background: radial-gradient(circle at 50% 20%, rgba(255,255,255,.9), rgba(255,246,220,.72) 42%, rgba(255,133,169,.5)); font-family: "Trebuchet MS", system-ui, sans-serif; }
      .loading-card { width: min(100%, 330px); display: grid; gap: 14px; padding: 22px; border: 2px solid rgba(255,255,255,.82); border-radius: 28px; background: rgba(255,255,255,.74); box-shadow: 0 18px 34px rgba(91,24,42,.22); }
      .loading-title { margin: 0; font-size: 38px; line-height: 1; font-weight: 900; }
      .loading-subtitle { margin: 0; font-size: 16px; font-weight: 800; }
      .loading-track { height: 16px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.75); box-shadow: inset 0 2px 6px rgba(94,25,44,.16); }
      .loading-fill { width: 8%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #ff5b9b, #ffd75a, #59d77b); transition: width .22s ease; }
      .loading-percent { min-height: 18px; font-size: 14px; font-weight: 900; }
    </style>
    <link rel="stylesheet" href="./styles.css?v=20260709-rematch-2">
  </head>
  <body>
    <main class="phone-shell" aria-live="polite">
      <div id="app" class="app">
        <section class="loading-screen" id="loadingScreen" aria-live="polite">
          <div class="loading-card">
            <p class="loading-title">Деми-кубики</p>
            <p class="loading-subtitle" id="loadingText">Разогреваем кухню...</p>
            <div class="loading-track" aria-hidden="true"><div class="loading-fill" id="loadingFill"></div></div>
            <div class="loading-percent" id="loadingPercent">0%</div>
          </div>
        </section>
      </div>
    </main>
    <script src="./script.js?v=20260709-rematch-2" defer></script>
  </body>
</html>
